version: textus/3
# textus's own store — used while developing textus itself (ADR 0041).
# Write authority is derived from capabilities (ADR 0030): canon→author,
# workspace→keep, queue→propose, machine→reconcile. The human authors canon
# and accepts proposals; the agent keeps durable notes and proposes; automation
# reconciles the projected orientation. (ADR 0091: quarantine + derived folded into machine)
roles:
  - { name: human,      can: [author, propose] }
  - { name: agent,      can: [propose, keep] }
  - { name: automation, can: [reconcile] }
zones:
  - { name: knowledge, kind: canon,      desc: "the maintained source of truth about the repo (project + runbooks)" }
  - { name: notebook,  kind: workspace, owner: agent, desc: "the agent's own durable working notes across sessions" }
  - { name: proposals, kind: queue,      desc: "changes awaiting a human accept" }
  - { name: artifacts, kind: machine,    desc: "machine-maintained: computed outputs (artifacts.derived.*) — CLAUDE.md, AGENTS.md, configs" }
entries:
  - { key: knowledge.project,  path: knowledge/project.md, zone: knowledge, schema: project, owner: human:self, kind: leaf }
  - { key: knowledge.runbooks, path: knowledge/runbooks,   zone: knowledge, schema: runbook, owner: human:self, nested: true, kind: nested }
  - key: knowledge.reference
    path: knowledge/reference
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/reference }
  - key: knowledge.how-to
    path: knowledge/how-to
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/how-to }
  - key: knowledge.explanation
    path: knowledge/explanation
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/explanation }
  - key: knowledge.cookbook
    path: knowledge/cookbook
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/cookbook }
  - key: knowledge.tutorials
    path: knowledge/tutorials
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/tutorials }
  - key: knowledge.decisions
    path: knowledge/decisions
    zone: knowledge
    schema: null
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/architecture/decisions }
  - key: knowledge.docs-index
    path: knowledge/docs-readme.md
    zone: knowledge
    schema: null
    owner: human:self
    kind: leaf
    publish:
      - { to: docs/README.md }
  - key: knowledge.architecture-index
    path: knowledge/architecture-readme.md
    zone: knowledge
    schema: null
    owner: human:self
    kind: leaf
    publish:
      - { to: docs/architecture/README.md }
  - { key: notebook.notes,     path: notebook/notes,       zone: notebook,  schema: null,    owner: agent:self, nested: true, kind: nested }
  - { key: proposals.notes,    path: proposals/notes,      zone: proposals, schema: null,    owner: agent:self, nested: true, kind: nested }
  - key: artifacts.derived.orientation
    path: artifacts/derived/orientation.json
    zone: artifacts
    source:
      from: project
      select:
        - knowledge.project
        - knowledge.runbooks
      transform: orientation_reducer
    publish:
      - { to: CLAUDE.md, template: orientation.mustache, inject_boot: true }
      - { to: AGENTS.md, template: orientation.mustache }
    kind: derived
  - key: artifacts.derived.mcp-config
    path: artifacts/derived/mcp.json
    zone: artifacts
    source: { from: project, select: [knowledge.project], transform: mcp_config_reducer }
    publish: [{ to: .mcp.json }]
    kind: derived
  - key: artifacts.derived.claude-plugin
    path: artifacts/derived/plugin.json
    zone: artifacts
    source: { from: project, select: [knowledge.project], transform: plugin_manifest_reducer }
    publish: [{ to: .claude-plugin/plugin.json }]
    kind: derived
