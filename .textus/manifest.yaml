version: textus/3
roles:
  - { name: human,      can: [author, propose] }
  - { name: agent,      can: [propose, keep] }
  - { name: automation, can: [converge] }
lanes:
  - { name: knowledge, kind: canon,     desc: "the maintained source of truth about the repo" }
  - { name: notebook,  kind: workspace, owner: agent, desc: "the agent's own durable working notes" }
  - { name: proposals, kind: queue,     desc: "changes awaiting a human accept" }
  - { name: artifacts, kind: machine,   desc: "machine-maintained computed outputs" }
entries:
  - { key: knowledge.project,  lane: knowledge, schema: project, owner: human:self, kind: leaf }
  - { key: knowledge.runbooks, lane: knowledge, schema: runbook, owner: human:self, nested: true, kind: nested }
  - key: knowledge.reference
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    ignore: ["**/verbs.md", "**/schema.md", "**/adr-log.md", "**/authority.md"]
    publish:
      - { tree: docs/reference }
  - key: knowledge.how-to
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/how-to }]
  - key: knowledge.explanation
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/explanation }]
  - key: knowledge.cookbook
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/cookbook }]
  - key: knowledge.tutorials
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/tutorials }]
  - key: knowledge.decisions
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/architecture/decisions }]
  - { key: knowledge.docs-index,         path: knowledge/docs-readme.md,         lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: docs/README.md }] }
  - { key: knowledge.architecture-index, path: knowledge/architecture-readme.md, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: docs/architecture/README.md }] }
  - { key: knowledge.readme,       lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: README.md }] }
  - { key: knowledge.contributing, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: CONTRIBUTING.md }] }
  - { key: knowledge.security,     lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: SECURITY.md }] }
  - { key: notebook.notes,  lane: notebook,  owner: agent:self, nested: true, kind: nested }
  - { key: proposals.notes, lane: proposals, owner: agent:self, nested: true, kind: nested }
  - key: artifacts.derived.orientation
    lane: artifacts
    kind: produced
    source: { from: external, command: "true", sources: [] }
    publish:
      - { to: CLAUDE.md,  template: orientation.mustache, inject_boot: true }
      - { to: AGENTS.md,  template: orientation.mustache }
  - { key: artifacts.derived.mcp-config,      path: artifacts/derived/mcp.json,      lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: .mcp.json }] }
  - { key: artifacts.derived.claude-plugin,   path: artifacts/derived/plugin.json,   lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: .claude-plugin/plugin.json }] }
  - { key: artifacts.derived.opencode-config, path: artifacts/derived/opencode.json, lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: opencode.json }] }
  - key: artifacts.derived.verbs
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/verbs.md, template: verbs.mustache }]
  - key: artifacts.derived.schema
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/schema.md, template: schema.mustache }]
  - key: artifacts.derived.adr-log
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/adr-log.md, template: adr-log.mustache }]
  - key: artifacts.derived.authority
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/authority.md, template: authority.mustache }]
