version: textus/4
roles:
  - { name: human,      can: [author, propose, ingest] }
  - { name: agent,      can: [propose, keep, ingest] }
  - { name: automation, can: [converge, ingest] }
lanes:
  - { name: knowledge, kind: canon,     desc: "the maintained source of truth about the repo" }
  - { name: notebook,  kind: workspace, owner: agent, desc: "the agent's own durable working notes" }
  - { name: proposals, kind: queue,     desc: "changes awaiting a human accept" }
  - { name: artifacts, kind: machine,   desc: "machine-maintained computed outputs" }
  - { name: raw,       kind: raw,       desc: "ingested external source material (write-once)" }
entries:
  - { key: knowledge.project,  lane: knowledge, schema: project, owner: human:self, kind: leaf }
  - { key: knowledge.runbooks, lane: knowledge, schema: runbook, owner: human:self, nested: true, kind: nested }
  - key: knowledge.reference
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    ignore: ["**/verbs.md", "**/schema.md", "**/adr-log.md", "**/authority.md", "**/events.md", "**/mcp.md"]
    publish:
      - { tree: docs/reference }
  - key: knowledge.how-to
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/how-to }]
  - key: knowledge.explanation
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/explanation }]
  - key: knowledge.cookbook
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/cookbook }]
  - key: knowledge.tutorials
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/tutorials }]
  - key: knowledge.decisions
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/architecture/decisions }]
  - { key: knowledge.docs-index,         lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: docs/README.md }] }
  - { key: knowledge.architecture-index, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: docs/architecture/README.md }] }
  - { key: knowledge.readme,       lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: README.md }] }
  - { key: knowledge.contributing, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: CONTRIBUTING.md }] }
  - { key: knowledge.security,     lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: SECURITY.md }] }
  - { key: knowledge.spec,         lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: SPEC.md }] }
  - { key: notebook.notes,  lane: notebook,  owner: agent:self, nested: true, kind: nested }
  - { key: proposals.notes, lane: proposals, owner: agent:self, nested: true, kind: nested }
  - { key: raw, lane: raw, owner: agent:self, nested: true, kind: nested, format: yaml }
  - key: artifacts.orientation
    lane: artifacts
    kind: produced
    source: { from: external, command: "true", sources: [] }
    publish:
      - { to: CLAUDE.md,  template: docs/orientation.erb, inject_boot: true }
      - { to: AGENTS.md,  template: docs/orientation.erb }
  - { key: artifacts.mcp-config,      path: artifacts/mcp.json,      lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: .mcp.json }] }
  - { key: artifacts.claude-plugin,   path: artifacts/plugin.json,   lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: .claude-plugin/plugin.json }] }
  - { key: artifacts.opencode-config, path: artifacts/opencode.json, lane: artifacts, kind: produced, source: { from: external, command: "true", sources: [] }, publish: [{ to: opencode.json }] }
  - key: artifacts.verbs
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/verbs.md, template: docs/verbs.erb }]
  - key: artifacts.schema
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/schema.md, template: docs/schema.erb }]
  - key: artifacts.adr-log
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/adr-log.md, template: docs/adr-log.erb }]
  - key: artifacts.authority
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/authority.md, template: docs/authority.erb }]
  - key: artifacts.events
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/events.md, template: docs/events.erb }]
  - key: artifacts.mcp
    path: artifacts/mcp-catalog.json
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/mcp.md, template: docs/mcp.erb }]
  - key: artifacts.index
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
  - key: artifacts.skills
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/skills.md, template: feeds/skills.erb }]
