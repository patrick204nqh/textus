version: textus/4
roles:
  - { name: human,      can: [author, propose, ingest] }
  - { name: agent,      can: [propose, keep, ingest] }
  - { name: automation, can: [converge, ingest] }
lanes:
  - { name: knowledge, kind: canon,     desc: "the maintained source of truth about the repo" }
  - { name: scratchpad,  kind: workspace, owner: agent, desc: "the agent's own durable scratchpad (working memory)" }
  - { name: proposals, kind: queue,     desc: "changes awaiting a human accept" }
  - { name: artifacts, kind: machine,   desc: "machine-maintained computed outputs" }
  - { name: raw,       kind: raw,       desc: "ingested external source material (write-once)" }
entries:
  - { key: knowledge.project,  lane: knowledge, schema: project, owner: human:self, kind: leaf }
  - { key: knowledge.runbooks, lane: knowledge, schema: runbook, owner: human:self, nested: true, kind: nested }
  - key: knowledge.reference
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    ignore: ["**/verbs.md", "**/schema.md", "**/adr-log.md", "**/authority.md", "**/events.md", "**/mcp.md", "**/skills.md"]
    publish:
      - { tree: docs/reference }
  - key: knowledge.how-to
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/how-to }]
  - key: knowledge.explanation
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/explanation }]
  - key: knowledge.design
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish: [{ tree: docs/design }]
  - key: knowledge.cookbook
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    ignore: ["**/README.md"]
    publish: [{ tree: docs/cookbook }]
  - key: knowledge.decisions
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    ignore: ["**/README.md"]
    publish: [{ tree: docs/architecture/decisions }]
  - key: artifacts.docs.index
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish:
      - { to: docs/README.md, template: docs/docs-index.erb }
  - { key: knowledge.architecture-index, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: docs/architecture/README.md }] }
  - key: knowledge.readme
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
  - { key: knowledge.contributing, lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: CONTRIBUTING.md }] }
  - { key: knowledge.security,     lane: knowledge, owner: human:self, kind: leaf, publish: [{ to: SECURITY.md }] }
  - key: knowledge.specs
    lane: knowledge
    owner: human:self
    nested: true
    kind: nested
    publish:
      - { tree: docs/reference/specs }
  - key: knowledge.spec
    lane: knowledge
    owner: human:self
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish:
      - { to: SPEC.md, template: docs/spec.erb }
  - { key: scratchpad.notes,  lane: scratchpad,  owner: agent:self, nested: true, kind: nested }
  - { key: proposals.notes, lane: proposals, owner: agent:self, nested: true, kind: nested }
  - { key: raw, lane: raw, owner: agent:self, nested: true, kind: nested, format: yaml }
  # Boot artifact — pre-computed agent orientation (drain computes, boot reads)
  - key: artifacts.boot
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish:
      - { to: CLAUDE.md,  template: docs/orientation.erb, inject_boot: true }
      - { to: AGENTS.md,  template: docs/orientation.erb, inject_boot: true }
  # Config — tool configuration files
  - key: artifacts.config.opencode
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: opencode.json }]
  - key: artifacts.config.mcp
    path: artifacts/config/claude-mcp.json
    lane: artifacts
    kind: produced
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: .mcp.json }]
  - key: artifacts.config.plugin
    path: artifacts/config/claude-plugin.json
    lane: artifacts
    kind: produced
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: .claude-plugin/plugin.json }]
  # Docs — generated reference documentation
  - key: artifacts.docs.adr-log
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/adr-log.md, template: docs/adr-log.erb }]
  - key: artifacts.docs.readme
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: README.md, template: docs/readme.erb }]
  # System — internal machinery
  - key: artifacts.system.index
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
  - key: artifacts.feeds.skills
    lane: artifacts
    kind: produced
    format: json
    source: { from: external, command: "true", sources: [] }
    publish: [{ to: docs/reference/skills.md, template: feeds/skills.erb }]
