<!--
  textus — favicon + social-card <head> snippet.
  Drop into the <head> of any docs site / GitHub Pages.

  Paths below assume GitHub Pages served from the /docs folder of the
  patrick204nqh/textus project site, so the site base is "/textus/".
  Adjust the "/textus/assets/branding/" prefix if your base path differs
  (e.g. a custom domain → use "/assets/branding/", a generator → use its base).
  og:image / twitter:image MUST be absolute URLs.
-->
<link rel="icon" href="/textus/assets/branding/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/textus/assets/branding/favicon.svg">
<link rel="apple-touch-icon" href="/textus/assets/branding/apple-touch-icon.png">
<link rel="manifest" href="/textus/assets/branding/site.webmanifest">
<meta name="theme-color" content="#14B8A6">

<meta property="og:type" content="website">
<meta property="og:title" content="textus">
<meta property="og:description" content="Durable, multi-writer context for codebases that humans and AI agents both touch.">
<meta property="og:image" content="https://patrick204nqh.github.io/textus/assets/branding/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="textus">
<meta name="twitter:description" content="Durable, multi-writer context for codebases that humans and AI agents both touch.">
<meta name="twitter:image" content="https://patrick204nqh.github.io/textus/assets/branding/og-image.png">
