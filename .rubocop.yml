plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "pkg/**/*"
    - "lib/textus/init/templates/**/*" # scaffold sources copied verbatim into user stores (ADR 0043)
    - "docs/plans/**/*"

# --- Style ---
Style/Documentation:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: false
Style/StringLiterals:
  EnforcedStyle: double_quotes
Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
Style/StringConcatenation:
  Enabled: false   # `+` is fine for short concats in this codebase
Style/RaiseArgs:
  EnforcedStyle: compact   # `raise Foo.new(...)` matches existing style
Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma
Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma
Style/GlobalStdStream:
  Enabled: false   # examples/mcp-server uses STDIN/STDOUT intentionally
Style/MutableConstant:
  Enabled: false   # REGISTRY hashes are intentionally mutable
Style/MultilineBlockChain:
  Enabled: false
Style/CombinableLoops:
  Enabled: false   # `Store#stale` and `#validate_all` have intentionally separate passes
Style/RedundantBegin:
  Enabled: false   # `... rescue ... end` postfix is clearer in some flows

# --- Layout ---
Layout/LineLength:
  Max: 140
  AllowedPatterns:
    - "^\\s*#"

# --- Metrics ---
Metrics/MethodLength:
  Max: 40
Metrics/ClassLength:
  Max: 300
Metrics/ModuleLength:
  Max: 250
Metrics/AbcSize:
  Max: 40
Metrics/CyclomaticComplexity:
  Max: 15
Metrics/PerceivedComplexity:
  Max: 15
Metrics/ParameterLists:
  # Honest ceiling for this codebase: value-object constructors/factories
  # (Envelope.build, Entry, Error, Freshness.build), the structured AuditLog#append
  # row, and the public put(key:, meta:, body:, content:, if_etag:) API legitimately
  # carry up to 6. Predicate self.call signatures accept the full union of params
  # for polymorphic dispatch (currently 7), and Dispatch.dispatch carries 7.
  Max: 8
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
Metrics/BlockNesting:
  Max: 4

# --- Lint ---
Lint/EmptyBlock:
  Exclude:
    - "lib/textus/cli.rb"   # OptionParser blocks intentionally swallow consumed flags
Lint/DuplicateBranch:
  Enabled: false   # CLI verb dispatch has near-duplicate envelope wrappers by design

# --- Gemspec ---
Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec   # we keep dev deps in the gemspec, not the Gemfile

# --- RSpec ---
# Numeric maxes are ratchets at the suite's current ceiling (ADR 0080 Phase 3):
# they prevent regression past today's worst case. ExampleLength stays at 25 —
# tightening costs 25+ rewrites of green examples for no clear benefit, and the
# style guide accepts aggregate_failures as the alternative to splitting.
RSpec/ExampleLength:
  Max: 25
RSpec/MultipleExpectations:
  Max: 8 # examples needing more tag :aggregate_failures (the style-guide path)
RSpec/NestedGroups:
  Max: 4
RSpec/DescribeClass:
  Enabled: false
RSpec/MultipleMemoizedHelpers:
  Max: 8
RSpec/ContextWording:
  # shared_context names are noun phrases by RSpec convention, not when/with/without
  Exclude:
    - "spec/support/**/*"
RSpec/DescribedClass:
  Enabled: false   # spec style uses full constant path for clarity
RSpec/NamedSubject:
  Enabled: false   # codebase uses `subject` extensively as a style choice
RSpec/MessageChain:
  Enabled: false   # message chain stubs used in geometry spec
RSpec/SpecFilePathFormat:
  Enabled: false   # spec file names don't 1:1 mirror class names

# --- Naming ---
Naming/MethodParameterName:
  AllowedNames: [as, fm, o, e, h, k, v, r, s, n, p, m, f, d, w, g, z, to]
Naming/MemoizedInstanceVariableName:
  EnforcedStyleForLeadingUnderscores: optional
