version: textus/1
zones:
  - { name: canon,   writable_by: [human] }
  - { name: working, writable_by: [human, ai, script] }
  - { name: intake,  writable_by: [script] }
  - { name: derived, writable_by: [build] }
entries:
  # ---- canon: author-curated, slow-changing identity ----
  - key: canon.voice
    path: canon/voice.md
    zone: canon
    schema: null
    owner: human:self

  # ---- working: day-to-day editable surface ----
  - key: working.projects
    path: working/projects
    zone: working
    schema: project
    owner: human:self
    nested: true

  - key: working.skills
    path: working/skills
    zone: working
    schema: null
    owner: human:self
    nested: true

  # ---- intake: script-fed, TTL-bound ----
  - key: intake.upstream.releases
    path: intake/upstream/releases.md
    zone: intake
    schema: null
    owner: script:cron
    source:
      fetcher: rss
      config:
        url: https://example.com/releases.rss
      ttl: 6h

  # Reads from a local file via the project-local :local-file fetcher.
  # Run `textus refresh intake.upstream.notes --as=script` to materialize.
  - key: intake.upstream.notes
    path: intake/upstream/notes.md
    zone: intake
    schema: null
    owner: script:local
    source:
      fetcher: local-file
      config:
        path: .textus/zones/canon/voice.md
      ttl: 12h

  # ---- derived: machine-built, never hand-edited ----
  - key: derived.claude.root
    path: derived/claude/root.md
    zone: derived
    schema: null
    owner: build:auto
    projection:
      select: [working.projects]
      pluck: [name, status, summary, updated_at]
      reducer: rank-by-recency
    template: claude-root.mustache
    publish_to: [CLAUDE.md]
    # External-runner hook: textus surfaces this via `extensions list`
    # but does NOT invoke it. A wrapper (cron, lefthook, CI) reads
    # `textus extensions list --kind=hook --format=json` and dispatches.
    events:
      build:
        - { exec: bin/notify-build, as: script }

  - key: derived.marketplace
    path: derived/marketplace.md
    zone: derived
    schema: null
    owner: build:auto
    projection:
      select: [working.skills]
      pluck: [name, description, version]
      sort_by: name
    template: marketplace.mustache
    publish_to: [marketplace.json]
