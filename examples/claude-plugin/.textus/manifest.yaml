version: textus/2
zones:
  - { name: identity, writable_by: [human] }
  - { name: working,  writable_by: [human, ai, script] }
  - { name: inbox,    writable_by: [script] }
  - { name: review,   writable_by: [ai, human] }
  - { name: output,   writable_by: [build] }

entries:
  # ---- identity: plugin + marketplace identity (slow-changing, human-authored) ----
  - { key: identity.plugin,       path: identity/voice-tools.md,           zone: identity, schema: plugin, owner: human:self }
  - { key: identity.marketplace,  path: identity/example-marketplace.md,   zone: identity, schema: null,   owner: human:self }

  # ---- working: catalogued plugin content ----
  - key: working.agents
    path: working/agents
    zone: working
    schema: agent
    owner: human:self
    nested: true
    publish_each: "agents/{basename}.md"

  - key: working.skills
    path: working/skills
    zone: working
    schema: skill
    owner: human:self
    nested: true     # supports working.skills.writing.voice-writer (≥4 segments)
    publish_each: "skills/{basename}/SKILL.md"

  - key: working.commands
    path: working/commands
    zone: working
    schema: command
    owner: human:self
    nested: true
    publish_each: "commands/{basename}.md"

  # ---- review: AI proposals awaiting human accept ----
  # An AI agent writes a proposal here with --as=ai. A human reviews it and
  # runs `textus accept review.<id> --as=human`, which (a) writes the
  # proposal's `target_key` to its real home and (b) deletes the review
  # entry. See examples/claude-plugin/README.md → "AI proposals (review)".
  - key: review.suggestion
    path: review/suggestion
    zone: review
    schema: null
    owner: ai:catalog
    nested: true

  # ---- inbox: fetch-fed (textus capability demo) ----
  - key: inbox.upstream.notes
    path: inbox/upstream/notes.md
    zone: inbox
    owner: script:local
    intake:
      handler: local_file
      config: { path: .textus/zones/identity/voice-tools.md }

  # ---- output: machine-built ----
  - key: output.plugin
    path: output/plugin.json
    zone: output
    format: json
    owner: build:auto
    projection:
      select: [identity.plugin]
      pluck: "*"
      reduce: plugin_envelope
    publish_to: [.claude-plugin/plugin.json]

  - key: output.marketplace
    path: output/marketplace.json
    zone: output
    format: json
    owner: build:auto
    projection:
      select: [identity.marketplace, identity.plugin, working.skills]
      pluck: "*"
      reduce: marketplace_envelope
    publish_to: [.claude-plugin/marketplace.json]

  - key: output.claude-root
    path: output/claude-root.md
    zone: output
    owner: build:auto
    projection:
      select: [identity.plugin, working.agents, working.skills, working.commands]
      pluck: "*"
      reduce: claude_root
    template: claude-root.mustache
    inject_intro: true
    publish_to: [CLAUDE.md]
    events:
      built:
        - { exec: bin/notify-build, as: script }

policies:
  # Freshness for the inbox demo — was per-entry intake.ttl in 0.9.1.
  - match: inbox.upstream.notes
    refresh:
      ttl: 12h
