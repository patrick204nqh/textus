---
version: textus/3
zones:
- name: identity
  write_policy:
  - human
  read_policy:
  - all
- name: working
  write_policy:
  - human
  - agent
  - runner
  read_policy:
  - all
- name: review
  write_policy:
  - agent
  - human
  read_policy:
  - all
- name: output
  write_policy:
  - builder
  read_policy:
  - all
entries:
- key: identity.plugin
  path: identity/voice-tools.md
  zone: identity
  schema: plugin
  owner: human:self
- key: working.agents
  path: working/agents
  zone: working
  schema: agent
  owner: human:self
  nested: true
  publish_each: agents/{basename}.md
- key: working.skills
  path: working/skills
  zone: working
  schema: skill
  owner: human:self
  nested: true
  publish_each: skills/{basename}/SKILL.md
- key: working.commands
  path: working/commands
  zone: working
  schema: command
  owner: human:self
  nested: true
  publish_each: commands/{basename}.md
- key: review.suggestion
  path: review/suggestion
  zone: review
  schema:
  owner: agent:catalog
  nested: true
- key: output.plugin
  path: output/plugin.json
  zone: output
  format: json
  owner: builder:auto
  publish_to:
  - ".claude-plugin/plugin.json"
  compute:
    select:
    - identity.plugin
    pluck: "*"
    kind: projection
    transform: plugin_envelope
- key: output.claude-root
  path: output/claude-root.md
  zone: output
  owner: builder:auto
  template: claude-root.mustache
  inject_intro: true
  publish_to:
  - CLAUDE.md
  compute:
    select:
    - identity.plugin
    - working.agents
    - working.skills
    - working.commands
    pluck: "*"
    kind: projection
    transform: claude_root
rules:
- match: review.**
  promotion:
    requires:
    - schema_valid
    - human_accept
