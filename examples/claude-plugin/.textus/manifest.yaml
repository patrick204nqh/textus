---
version: textus/3
# Write authority is derived from capabilities (ADR 0030): originâ†’accept,
# queueâ†’propose, derivedâ†’build. The human holds accept+propose, the agent
# only propose (review queue), and automation fetches/builds â€” it owns the
# derived output envelopes.
roles:
- name: human
  can:
  - accept
  - propose
- name: agent
  can:
  - propose
- name: automation
  can:
  - fetch
  - build
zones:
- name: identity
  kind: origin
  read_policy:
  - all
- name: working
  kind: origin
  read_policy:
  - all
- name: review
  kind: queue
  read_policy:
  - all
- name: output
  kind: derived
  read_policy:
  - all
entries:
- key: identity.plugin
  path: identity/voice-tools.md
  zone: identity
  schema: plugin
  owner: human:self
  kind: leaf
- key: working.agents
  path: working/agents
  zone: working
  schema: agent
  owner: human:self
  nested: true
  publish_each: agents/{basename}.md
  kind: nested
- key: working.skills
  path: working/skills
  zone: working
  schema: skill
  owner: human:self
  nested: true
  publish_each: skills/{basename}/SKILL.md
  kind: nested
- key: working.commands
  path: working/commands
  zone: working
  schema: command
  owner: human:self
  nested: true
  publish_each: commands/{basename}.md
  kind: nested
- key: review.suggestion
  path: review/suggestion
  zone: review
  schema:
  owner: agent:catalog
  nested: true
  kind: nested
- key: output.plugin
  path: output/plugin.json
  zone: output
  format: json
  owner: automation:auto
  publish_to:
  - ".claude-plugin/plugin.json"
  compute:
    select:
    - identity.plugin
    pluck: "*"
    kind: projection
    transform: plugin_envelope
  kind: derived
- key: output.claude-root
  path: output/claude-root.md
  zone: output
  owner: automation:auto
  template: claude-root.mustache
  inject_boot: true
  publish_to:
  - CLAUDE.md
  compute:
    select:
    - identity.plugin
    - working.agents
    - working.skills
    - working.commands
    pluck: "*"
    kind: projection
    transform: claude_root
  kind: derived
rules:
- match: review.**
  promotion:
    requires:
    - schema_valid
    - accept_signed
