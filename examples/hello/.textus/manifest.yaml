version: textus/3

# Two roles, two zones. Smallest manifest that demonstrates the
# textus value over "just writing Markdown files in a folder":
# capability-gated writes + a review queue + an audit log of every change.
#
# Write authority is DERIVED from capabilities (ADR 0030): each zone kind
# requires a verb (canon→accept, queue→propose), and a zone is writable
# by any role holding that verb. The human holds `accept` (can land in
# the canon zone) and `propose`; the agent holds only `propose` (can only
# stage into the review queue, never write canon directly).
roles:
  - { name: human, can: [accept, propose] }
  - { name: agent, can: [propose] }

zones:
  - { name: working, kind: canon }
  - { name: review,  kind: queue }

# Two entry families, both nested (any leaf under the prefix is valid).
# `note` is the human's source of truth; `proposal` is where the agent
# parks suggestions until a human accepts them.
entries:
  - key: working.notes
    path: working/notes
    zone: working
    schema: note
    owner: human:self
    nested: true
    kind: nested

  - key: review.notes
    path: review/notes
    zone: review
    schema: note
    owner: agent:self
    nested: true
    kind: nested
