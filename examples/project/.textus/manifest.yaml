---
version: textus/3
# Write authority is derived from capabilities (ADR 0030): canonâ†’author,
# queueâ†’propose, derivedâ†’build. The human holds author+propose, the agent
# only propose (proposals queue), and automation builds the derived output.
roles:
- name: human
  can:
  - author
  - propose
- name: agent
  can:
  - propose
- name: automation
  can:
  - build
  - fetch
zones:
- name: knowledge
  kind: canon
  desc: project facts and operational runbooks
- name: feeds
  kind: quarantine
  desc: external inputs pulled in (e.g. the incident export)
- name: proposals
  kind: queue
  desc: changes awaiting your accept
- name: artifacts
  kind: derived
  desc: build-computed outputs (CLAUDE.md, AGENTS.md)
entries:
- key: knowledge.project
  path: knowledge/project.md
  zone: knowledge
  schema: project
  owner: human:self
  kind: leaf
- key: knowledge.runbooks
  path: knowledge/runbooks
  zone: knowledge
  schema: runbook
  owner: human:self
  nested: true
  kind: nested
- key: proposals.decisions
  path: proposals/decisions
  zone: proposals
  schema: decision
  owner: agent
  nested: true
  kind: nested
- key: artifacts.orientation
  path: artifacts/orientation.md
  zone: artifacts
  template: orientation.mustache
  inject_boot: true
  publish_to:
  - CLAUDE.md
  - AGENTS.md
  compute:
    kind: projection
    select:
    - knowledge.project
    - knowledge.runbooks
    transform: orientation_reducer
  kind: derived
# A snapshot of recent incidents, pulled by `textus fetch feeds.incidents
# --as=automation`. tracked:false â†’ the fetched file is gitignored (incident
# data is operational and noisy) but stays readable via `textus get
# feeds.incidents`, and is never published. (ADR 0043)
- key: feeds.incidents
  path: feeds/incidents.yaml
  zone: feeds
  format: yaml
  tracked: false
  kind: intake
  intake:
    handler: incidents
    config:
      path: incidents.json
rules:
- match: feeds.incidents
  fetch:
    ttl: 1h
    on_stale: warn
