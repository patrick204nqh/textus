---
version: textus/3
# Write authority is derived from capabilities (ADR 0030): canonâ†’author,
# queueâ†’propose, machineâ†’reconcile. The human holds author+propose, the agent
# only propose (proposals queue), and automation materializes/fetches in the
# machine zone (ADR 0091: quarantine + derived folded into `machine`).
roles:
- name: human
  can:
  - author
  - propose
- name: agent
  can:
  - propose
- name: automation
  can:
  - reconcile
zones:
- name: knowledge
  kind: canon
  desc: project facts and operational runbooks
- name: proposals
  kind: queue
  desc: changes awaiting your accept
- name: artifacts
  kind: machine
  desc: computed outputs + external feeds (ADR 0091)
entries:
- key: knowledge.project
  path: knowledge/project.md
  zone: knowledge
  schema: project
  owner: human:self
  kind: leaf
- key: knowledge.runbooks
  path: knowledge/runbooks
  zone: knowledge
  schema: runbook
  owner: human:self
  nested: true
  kind: nested
- key: proposals.decisions
  path: proposals/decisions
  zone: proposals
  schema: decision
  owner: agent
  nested: true
  kind: nested
- key: artifacts.orientation
  path: artifacts/orientation.md
  zone: artifacts
  template: orientation.mustache
  inject_boot: true
  publish:
    to:
    - CLAUDE.md
    - AGENTS.md
  compute:
    kind: projection
    select:
    - knowledge.project
    - knowledge.runbooks
    transform: orientation_reducer
  kind: derived
# A per-host snapshot, pulled by `textus fetch artifacts.machines.local
# --as=automation` (the same nested entry + machine_intake.rb hook that
# `textus init` scaffolds). Grows to a fleet â€” add artifacts.machines.<host>
# over SSH (see ../../../docs/cookbook/environment-scan.md). tracked:false â†’
# the fetched files are gitignored but stay readable via
# `textus get artifacts.machines.local`. (ADR 0043)
- key: artifacts.machines
  path: artifacts/machines
  zone: artifacts
  format: yaml
  nested: true
  tracked: false
  kind: intake
  intake:
    handler: machines
    config:
      machines:
        local: { via: local }
rules:
- match: artifacts.machines.**
  upkeep:
    ttl: 1h
    action: warn
