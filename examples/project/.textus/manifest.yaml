---
version: textus/3
# Write authority is derived from capabilities (ADR 0030): origin‚Üíaccept,
# queue‚Üípropose, derived‚Üíbuild. The human holds accept+propose, the agent
# only propose (review queue), and automation builds the derived output.
roles:
- name: human
  can:
  - accept
  - propose
- name: agent
  can:
  - propose
- name: automation
  can:
  - build
zones:
- name: identity
  kind: origin
  read_policy:
  - all
- name: working
  kind: origin
  read_policy:
  - all
- name: review
  kind: queue
  read_policy:
  - all
- name: output
  kind: derived
  read_policy:
  - all
entries:
- key: identity.project
  path: identity/project.md
  zone: identity
  schema: project
  owner: human:self
  kind: leaf
- key: working.runbooks
  path: working/runbooks
  zone: working
  schema: runbook
  owner: human:self
  nested: true
  kind: nested
- key: review.decisions
  path: review/decisions
  zone: review
  schema: decision
  owner: agent
  nested: true
  kind: nested
- key: output.orientation
  path: output/orientation.md
  zone: output
  template: orientation.mustache
  inject_boot: true
  publish_to:
  - CLAUDE.md
  - AGENTS.md
  compute:
    kind: projection
    select:
    - identity.project
    - working.runbooks
    transform: orientation_reducer
  kind: derived
